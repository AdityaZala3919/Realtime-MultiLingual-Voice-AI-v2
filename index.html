<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Chatbot - Dual Output</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .status {
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header.original {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .panel-header.translated {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .panel-content.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-style: italic;
        }

        .chunk {
            margin-bottom: 12px;
            padding: 12px;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .panel-header.translated ~ .panel-content .chunk {
            border-left-color: #f5576c;
        }

        .chunk-count {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
            font-weight: 500;
        }

        .chunk-text {
            color: #333;
            font-size: 14px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .panel-content {
            scrollbar-width: thin;
            scrollbar-color: #888 #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Streaming Chatbot - Dual Output View</h1>
        <p>Upload audio, get real-time LLM output on the left, Translated output on the right</p>
    </div>

    <div style="background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);">
        <div class="controls">
            <div class="input-group">
                <input 
                    type="file" 
                    id="audioInput" 
                    accept="audio/*"
                >
                <button id="sendBtn" onclick="sendAudio()">Send Audio</button>
            </div>
        </div>
        <div class="controls" style="margin-top: 5px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 14px; color: #555;">🔊 Audio:</span>
                <span id="audioStatus" style="font-size: 13px; color: #999;">Idle</span>
                <button id="stopAudioBtn" onclick="stopAudio()" style="padding: 6px 12px; font-size: 12px; background: linear-gradient(135deg, #e74c3c, #c0392b);">Stop Audio</button>
            </div>
        </div>
        <div class="status" id="statusMessage"></div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="panel-header original">
                📝 Original LLM Output
            </div>
            <div class="panel-content scrollbar empty" id="originalContainer">
                Waiting for LLM response...
            </div>
        </div>

        <div class="panel">
            <div class="panel-header translated">
                🌐 Translated Output
            </div>
            <div class="panel-content scrollbar empty" id="translatedContainer">
                Waiting for translation...
            </div>
        </div>
    </div>

    <script>
        const WS_URL = "ws://localhost:8000/ws/chat";
        let ws = null;
        let audioCtx = null;
        let nextPlaybackTime = 0;
        let audioQueue = [];
        let isPlayingQueue = false;

        // Get or create AudioContext
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        // Resume audio context if suspended (browser autoplay policy)
        async function resumeAudioContext() {
            const ctx = getAudioContext();
            if (ctx.state === 'suspended') {
                await ctx.resume();
            }
        }

        function updateAudioStatus(text) {
            document.getElementById('audioStatus').textContent = text;
        }

        // Process queued audio buffers
        async function playFromQueue() {
            if (isPlayingQueue || audioQueue.length === 0) {
                return;
            }

            isPlayingQueue = true;

            while (audioQueue.length > 0) {
                const audioBuffer = audioQueue.shift();
                const ctx = getAudioContext();

                const source = ctx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(ctx.destination);

                const currentTime = ctx.currentTime;
                const startTime = Math.max(currentTime, nextPlaybackTime);
                source.start(startTime);
                nextPlaybackTime = startTime + audioBuffer.duration;

                // Wait for the chunk to finish playing
                await new Promise(resolve => {
                    source.onended = resolve;
                });

                updateAudioStatus(`▶️ Playing... (Queue: ${audioQueue.length})`);
            }

            isPlayingQueue = false;
            updateAudioStatus(`✅ Done`);
        }

        // Decode and queue a single audio chunk
        async function playAudioChunk(base64Audio) {
            try {
                await resumeAudioContext();
                const ctx = getAudioContext();

                // Convert base64 to ArrayBuffer
                const binaryString = atob(base64Audio);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Decode audio data
                const audioBuffer = await ctx.decodeAudioData(bytes.buffer);
                audioQueue.push(audioBuffer);

                updateAudioStatus(`▶️ Playing... (Queue: ${audioQueue.length})`);

                // Start playing if not already playing
                if (!isPlayingQueue) {
                    playFromQueue();
                }
            } catch (err) {
                console.error("Audio decode error:", err);
                updateAudioStatus(`❌ Error - retrying...`);
            }
        }

        function stopAudio() {
            audioQueue = [];
            audioCtx = null;
            isPlayingQueue = false;
            nextPlaybackTime = 0;
            updateAudioStatus("⏹️ Stopped");
        }

        function resetAudioState() {
            stopAudio();
            updateAudioStatus("🔊 Idle");
        }

        // Initialize WebSocket connection
        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log("WebSocket connected");
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.done) {
                    console.log("Streaming complete");
                    updateAudioStatus("✅ Done");
                } else if (data.type === "original") {
                    displayOriginalChunk(data);
                } else if (data.type === "translated") {
                    displayTranslatedChunk(data);
                } else if (data.type === "audio_chunk") {
                    // Play audio immediately as chunks arrive
                    await playAudioChunk(data.audio);
                }
            };

            ws.onerror = (error) => {
                console.error("WebSocket error:", error);
                showStatus("WebSocket connection error", "error");
                updateAudioStatus("❌ Connection Error");
            };

            ws.onclose = () => {
                console.log("WebSocket disconnected");
            };
        }

        function sendAudio() {
            const audioInput = document.getElementById("audioInput");
            const file = audioInput.files[0];
            const originalContainer = document.getElementById("originalContainer");
            const translatedContainer = document.getElementById("translatedContainer");
            const sendBtn = document.getElementById("sendBtn");
            const statusMessage = document.getElementById("statusMessage");

            if (!file) {
                showStatus("Please select an audio file", "error");
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showStatus("WebSocket not connected, reconnecting...", "error");
                connectWebSocket();
                return;
            }

            // Clear previous responses
            originalContainer.innerHTML = "";
            originalContainer.classList.add("empty");
            translatedContainer.innerHTML = "";
            translatedContainer.classList.add("empty");
            statusMessage.classList.remove("show");
            sendBtn.disabled = true;

            // Reset audio state for new message
            resetAudioState();

            try {
                const reader = new FileReader();
                reader.onload = function(e) {
                    ws.send(e.target.result);
                    showStatus("Audio sent... processing", "success");
                    sendBtn.disabled = false;
                };
                reader.onerror = function(error) {
                    showStatus(`Error reading file: ${error}`, "error");
                    sendBtn.disabled = false;
                };
                reader.readAsArrayBuffer(file);
            } catch (error) {
                originalContainer.innerHTML = `<div style="color: red;">Error: ${error.message}</div>`;
                showStatus(`Error: ${error.message}`, "error");
                sendBtn.disabled = false;
            }
        }

        function displayOriginalChunk(data) {
            const originalContainer = document.getElementById("originalContainer");
            if (originalContainer.classList.contains("empty")) {
                originalContainer.innerHTML = "";
                originalContainer.classList.remove("empty");
            }
            const chunk = document.createElement("div");
            chunk.className = "chunk";
            chunk.innerHTML = `
                <div class="chunk-text">${escapeHtml(data.text)}</div>
                <div class="chunk-count">Chunk #${data.stream_count}</div>
            `;
            originalContainer.appendChild(chunk);
            originalContainer.scrollTop = originalContainer.scrollHeight;
        }

        function displayTranslatedChunk(data) {
            const translatedContainer = document.getElementById("translatedContainer");
            if (translatedContainer.classList.contains("empty")) {
                translatedContainer.innerHTML = "";
                translatedContainer.classList.remove("empty");
            }
            const chunk = document.createElement("div");
            chunk.className = "chunk";
            chunk.innerHTML = `
                <div class="chunk-text">${escapeHtml(data.text)}</div>
                <div class="chunk-count">Chunk #${data.stream_count}</div>
            `;
            translatedContainer.appendChild(chunk);
            translatedContainer.scrollTop = translatedContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showStatus(message, type) {
            const statusMessage = document.getElementById("statusMessage");
            statusMessage.textContent = message;
            statusMessage.className = `status show ${type}`;

            setTimeout(() => {
                statusMessage.classList.remove("show");
            }, 5000);
        }

        // Connect WebSocket on load
        window.addEventListener("load", () => {
            connectWebSocket();
        });
    </script>
</body>
</html>
