<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #0d0d1a;
      --surface:     #16162a;
      --surface2:    #1e1e36;
      --border:      #2a2a4a;
      --accent:      #667eea;
      --accent2:     #f093fb;
      --text:        #e0e0f0;
      --text-muted:  #7070a0;
      --user-bubble: #1a2a5e;
      --bot-bubble:  #1e1e36;
      --green:       #4caf50;
      --red:         #f44336;
      --orange:      #ff9800;
      --blue:        #2196f3;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px;
      transition: color .25s;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background .25s;
      flex-shrink: 0;
    }
    .status-dot.idle       { background: var(--text-muted); }
    .status-dot.listening  { background: var(--green); }
    .status-dot.speaking   { background: var(--red);    animation: pulse-dot 0.9s ease-in-out infinite; }
    .status-dot.processing { background: var(--orange); animation: spin-dot  1.2s linear infinite; }
    .status-dot.responding { background: var(--blue);   animation: pulse-dot 1.4s ease-in-out infinite; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes spin-dot {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.5); }
      100% { transform: scale(1); }
    }

    /* Conversation */
    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }
    #conversation::-webkit-scrollbar { width: 6px; }
    #conversation::-webkit-scrollbar-track { background: transparent; }
    #conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .turn {
      display: flex;
      padding: 6px 24px;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .turn.user { justify-content: flex-end; }
    .turn.bot  { justify-content: flex-start; }

    .bubble {
      max-width: 70%;
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }
    .turn.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #d0dfff;
    }
    .turn.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      margin-bottom: 5px;
      opacity: .5;
      text-transform: uppercase;
    }
    .turn.user .bubble-label { color: #99aaff; }
    .turn.bot  .bubble-label { color: var(--accent2); }
    .bubble-text { white-space: pre-wrap; }

    /* Streaming cursor */
    .bubble.streaming .bubble-text::after {
      content: "\25AE";
      animation: blink-cursor .8s steps(1) infinite;
      margin-left: 1px;
      opacity: .7;
    }
    @keyframes blink-cursor {
      0%, 49% { opacity: .7; }
      50%, 100% { opacity: 0; }
    }
    .bubble.interrupted .bubble-text { opacity: .6; }
    .bubble.interrupted .bubble-text::after {
      content: " \21a9 interrupted";
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      animation: none;
      opacity: 1;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--text-muted);
      font-size: 14px;
      user-select: none;
      padding: 40px;
      text-align: center;
    }
    .empty-state .big-icon { font-size: 52px; }

    /* Bottom bar */
    .bottom-bar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 18px 24px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .mic-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    /* Mic orb */
    .mic-orb {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      background: linear-gradient(135deg, var(--accent), #764ba2);
      box-shadow: 0 4px 20px rgba(102,126,234,.35);
      transition: background .25s, box-shadow .25s;
      position: relative;
    }
    .mic-orb.speaking {
      background: linear-gradient(135deg, #f5576c, #ff6a88);
      box-shadow: 0 4px 25px rgba(245,87,108,.5);
    }
    .mic-orb.speaking::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(245,87,108,.4);
      animation: ring-pulse 1s ease-out infinite;
    }
    @keyframes ring-pulse {
      0%   { transform: scale(1);    opacity: 1; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    /* Audio wave bars */
    .wave-bars {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 32px;
      opacity: 0;
      transition: opacity .3s;
    }
    .wave-bars.active { opacity: 1; }
    .wave-bars .bar {
      width: 4px;
      border-radius: 2px;
      background: var(--accent);
      height: 6px;
      transform-origin: bottom;
    }
    .wave-bars.active .bar:nth-child(1) { animation: wave .8s ease-in-out 0.0s infinite; }
    .wave-bars.active .bar:nth-child(2) { animation: wave .8s ease-in-out 0.1s infinite; }
    .wave-bars.active .bar:nth-child(3) { animation: wave .8s ease-in-out 0.2s infinite; }
    .wave-bars.active .bar:nth-child(4) { animation: wave .8s ease-in-out 0.3s infinite; }
    .wave-bars.active .bar:nth-child(5) { animation: wave .8s ease-in-out 0.15s infinite; }
    @keyframes wave {
      0%, 100% { height: 6px;  }
      50%       { height: 26px; }
    }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; }
    .btn {
      padding: 7px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn:hover { background: var(--border); color: var(--text); }
    .btn.danger:hover {
      background: rgba(244,67,54,.15);
      border-color: var(--red);
      color: var(--red);
    }

    #sessionBtn {
      padding: 10px 30px;
      border-radius: 99px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #764ba2);
      color: white;
      box-shadow: 0 4px 14px rgba(102,126,234,.35);
      transition: opacity .2s, transform .15s;
    }
    #sessionBtn:hover  { opacity: .9; }
    #sessionBtn:active { transform: scale(.97); }
    #sessionBtn.active {
      background: linear-gradient(135deg, #f5576c, #c0392b);
      box-shadow: 0 4px 14px rgba(245,87,108,.35);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">
      <span>&#127897;&#65039;</span> Voice Agent
    </div>
    <div class="status-pill">
      <div class="status-dot idle" id="statusDot"></div>
      <span id="statusLabel">Offline</span>
    </div>
  </header>

  <div id="conversation">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">&#127897;&#65039;</div>
      <div>Press <strong>Start Session</strong> and begin speaking.</div>
      <div style="font-size:12px; color:var(--text-muted)">
        The agent listens continuously and responds naturally.<br/>
        Just start talking to interrupt a response.
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="mic-row">
      <div class="wave-bars" id="waveBars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>
      <div class="mic-orb" id="micOrb">&#127908;</div>
      <div style="width:56px"></div>
    </div>
    <button id="sessionBtn" onclick="toggleSession()">Start Session</button>
    <div class="btn-row">
      <button class="btn danger" onclick="clearConversation()">Clear</button>
    </div>
  </div>

<!-- No client-side VAD libraries needed: VAD runs on the server -->
<script>
(() => {
  //const WS_URL             = `wss://golden-nonanimated-mose.ngrok-free.dev/ws/agent`;
  
  const WS_URL             = `ws://${location.hostname}:8000/ws/agent`;

  const conversationEl = document.getElementById("conversation");
  const emptyStateEl   = document.getElementById("emptyState");
  const statusDot      = document.getElementById("statusDot");
  const statusLabel    = document.getElementById("statusLabel");
  const sessionBtn     = document.getElementById("sessionBtn");
  const micOrb         = document.getElementById("micOrb");
  const waveBars       = document.getElementById("waveBars");

  let ws            = null;
  let sessionActive = false;

  // Microphone streaming state
  let audioCtx        = null;
  let micStream       = null;
  let scriptProcessor = null;

  // Playback (MediaSource streaming, inspired by test.html)
  let audioEl      = null;
  let mediaSource  = null;
  let sourceBuffer = null;
  let bufferQueue  = [];
  let isAppending  = false;
  let streamDone   = false;

  // Bubble state
  let currentBotBubble     = null;
  let currentBotBubbleText = "";

  // ── Status ───────────────────────────────────────────────
  function setStatus(label, dotClass) {
    statusLabel.textContent = label;
    statusDot.className     = `status-dot ${dotClass}`;
  }

  // ── Audio playback (MediaSource) ─────────────────────────────
  function getAudioEl() {
    if (!audioEl) {
      audioEl = document.createElement('audio');
      audioEl.style.display = 'none';
      document.body.appendChild(audioEl);
      audioEl.addEventListener('playing', () => {
        waveBars.classList.add('active');
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ type: 'playback_started' }));
      });
      audioEl.addEventListener('ended', () => {
        waveBars.classList.remove('active');
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ type: 'playback_ended' }));
      });
    }
    return audioEl;
  }

  function resetMediaSource() {
    if (mediaSource && mediaSource.readyState === 'open') {
      try { mediaSource.endOfStream(); } catch(_) {}
    }
    mediaSource  = new MediaSource();
    sourceBuffer = null;
    bufferQueue  = [];
    isAppending  = false;
    streamDone   = false;

    const el = getAudioEl();
    el.src = URL.createObjectURL(mediaSource);

    // Single reliable play trigger — fires when the browser has enough data
    el.addEventListener('canplay', function onCanPlay() {
      el.removeEventListener('canplay', onCanPlay);
      el.play().catch(() => {});
    });

    mediaSource.addEventListener('sourceopen', () => {
      const mime = 'audio/mpeg';
      if (!MediaSource.isTypeSupported(mime)) {
        console.warn('audio/mpeg not supported via MediaSource in this browser');
        return;
      }
      sourceBuffer = mediaSource.addSourceBuffer(mime);
      sourceBuffer.mode = 'sequence';
      sourceBuffer.addEventListener('updateend', () => {
        isAppending = false;
        flushQueue();
      });
      // flush any chunks buffered before sourceopen fired
      flushQueue();
    }, { once: true });
  }

  function flushQueue() {
    if (isAppending || !sourceBuffer || sourceBuffer.updating) return;
    if (bufferQueue.length === 0) {
      if (streamDone && mediaSource && mediaSource.readyState === 'open') {
        try { mediaSource.endOfStream(); } catch(_) {}
        waveBars.classList.remove('active');
      }
      return;
    }
    isAppending = true;
    sourceBuffer.appendBuffer(bufferQueue.shift());
  }

  function appendAudioChunk(base64Audio) {
    // Decode base64 → ArrayBuffer and push to MediaSource
    const binary = atob(base64Audio);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    bufferQueue.push(bytes.buffer);
    flushQueue();
  }

  function stopAudio() {
    const wasPlaying = audioEl && !audioEl.paused;
    if (audioEl) {
      audioEl.pause();
      audioEl.src = '';
    }
    mediaSource  = null;
    sourceBuffer = null;
    bufferQueue  = [];
    isAppending  = false;
    streamDone   = false;
    waveBars.classList.remove('active');
    if (wasPlaying && ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'playback_ended' }));
  }

  // ── Conversation bubbles ──────────────────────────────────
  function hideEmpty() { emptyStateEl.style.display = "none"; }

  function addUserBubble(text) {
    hideEmpty();
    finalizeBotBubble();
    const turn      = document.createElement("div");
    turn.className  = "turn user";
    turn.innerHTML  = `<div class="bubble"><div class="bubble-label">You</div><div class="bubble-text">${esc(text)}</div></div>`;
    conversationEl.appendChild(turn);
    scrollBottom();
  }

  function getOrCreateBotBubble() {
    if (currentBotBubble) return currentBotBubble;
    hideEmpty();
    const turn   = document.createElement("div");
    turn.className = "turn bot";
    const bubble = document.createElement("div");
    bubble.className = "bubble streaming";
    bubble.innerHTML = `<div class="bubble-label">Agent</div><div class="bubble-text"></div>`;
    turn.appendChild(bubble);
    conversationEl.appendChild(turn);
    currentBotBubble     = bubble;
    currentBotBubbleText = "";
    scrollBottom();
    return bubble;
  }

  function appendBotText(text) {
    const bubble = getOrCreateBotBubble();
    currentBotBubbleText += (currentBotBubbleText ? " " : "") + text;
    bubble.querySelector(".bubble-text").textContent = currentBotBubbleText;
    scrollBottom();
  }

  function finalizeBotBubble(interrupted = false) {
    if (!currentBotBubble) return;
    currentBotBubble.classList.remove("streaming");
    if (interrupted && currentBotBubbleText)
      currentBotBubble.classList.add("interrupted");
    currentBotBubble     = null;
    currentBotBubbleText = "";
  }

  function clearConversation() {
    conversationEl.innerHTML = "";
    conversationEl.appendChild(emptyStateEl);
    emptyStateEl.style.display = "";
    finalizeBotBubble();
    stopAudio();
  }

  function scrollBottom() { conversationEl.scrollTop = conversationEl.scrollHeight; }
  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // ── WebSocket ─────────────────────────────────────────────
  function connectWS() {
    ws = new WebSocket(WS_URL);
    ws.binaryType = "arraybuffer";
    ws.onopen = () => setStatus("Listening", "listening");
    ws.onmessage = e => handleMsg(JSON.parse(e.data));
    ws.onerror = () => setStatus("Connection error", "idle");
    ws.onclose = () => { setStatus("Offline", "idle"); if (sessionActive) endSession(); };
  }

  function handleMsg(msg) {
    switch (msg.type) {
      case "speech_start":
        // Server-side VAD detected user speech onset
        micOrb.classList.add("speaking");
        setStatus("Listening to you\u2026", "speaking");
        stopAudio();
        finalizeBotBubble(false);
        break;
      case "processing":
        micOrb.classList.remove("speaking");
        setStatus("Processing\u2026", "processing");
        break;
      case "transcript":
        resetMediaSource();          // fresh MediaSource for each new turn
        addUserBubble(msg.text);
        setStatus("Thinking\u2026", "processing");
        break;
      case "bot_text":
        setStatus("Responding\u2026", "responding");
        appendBotText(msg.text);
        break;
      case "audio_chunk":
        appendAudioChunk(msg.audio);
        break;
      case "interrupted":
        stopAudio();
        finalizeBotBubble(true);
        setStatus("Listening", "listening");
        break;
      case "done":
        // Signal end-of-stream so MediaSource finalises and audio plays to completion
        streamDone = true;
        flushQueue();
        finalizeBotBubble(false);
        setStatus("Listening", "listening");
        break;
      case "idle":
        micOrb.classList.remove("speaking");
        setStatus("Listening", "listening");
        break;
      case "error":
        console.error("Server error:", msg.message);
        setStatus("Error \u2014 listening", "listening");
        break;
    }
  }

  // ── Continuous microphone streaming (server-side VAD) ─────
  // Streams raw float32 PCM chunks (512 samples @ 16 kHz, 2048 bytes each)
  // to the server, which runs Silero VAD and sends back speech events.
  async function startStreaming() {
    audioCtx  = new AudioContext({ sampleRate: 16000 });
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 16000,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      },
      video: false,
    });

    const source = audioCtx.createMediaStreamSource(micStream);

    // ScriptProcessorNode with bufferSize=512 → exactly what Silero expects
    // (512 samples × 4 bytes = 2048 bytes per frame).
    scriptProcessor = audioCtx.createScriptProcessor(512, 1, 1);
    scriptProcessor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const pcm = e.inputBuffer.getChannelData(0);
      ws.send(pcm.buffer.slice(pcm.byteOffset, pcm.byteOffset + pcm.byteLength));
    };

    source.connect(scriptProcessor);
    // Connect to destination to keep the audio graph alive in all browsers
    scriptProcessor.connect(audioCtx.destination);
  }

  function stopStreaming() {
    if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
    if (micStream)       { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)        { audioCtx.close(); audioCtx = null; }
  }

  // ── Session control ───────────────────────────────────────
  async function toggleSession() {
    sessionActive ? endSession() : await startSession();
  }

  async function startSession() {
    try {
      connectWS();
      await startStreaming();
      sessionActive = true;
      sessionBtn.textContent = "End Session";
      sessionBtn.classList.add("active");
      setStatus("Listening", "listening");
    } catch (err) {
      console.error(err);
      setStatus("Mic error", "idle");
      alert("Could not access microphone: " + err.message);
    }
  }

  function endSession() {
    stopStreaming();
    stopAudio();
    if (ws) { ws.close(); ws = null; }
    finalizeBotBubble(false);
    micOrb.classList.remove("speaking");
    sessionActive = false;
    sessionBtn.textContent = "Start Session";
    sessionBtn.classList.remove("active");
    setStatus("Offline", "idle");
  }

  window.toggleSession     = toggleSession;
  window.clearConversation = clearConversation;
})();
</script>
</body>
</html>
